use_default_settings: true

general:
  debug: false
  instance_name: "openclaw-search"

server:
  limiter: false
  image_proxy: false
  method: GET
  secret_key: "openclaw-search-local-only"

search:
  safe_search: 0
  autocomplete: ""
  default_lang: en
  formats:
    - html
    - json

outgoing:
  request_timeout: 5
  max_request_timeout: 10

ui:
  static_use_hash: true
  default_theme: simple
